<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sitaratas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1a1a1a;--ink2:#555;--ink3:#999;
  --line:#d8d4cc;--line2:#ede9e3;
  --paper:#faf9f6;--paper2:#f3f0ea;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-t:#1d4ed8;
  --green:#16a34a;--green-bg:#f0fdf4;
  --red:#dc2626;--red-bg:#fff1f2;
  --amber:#b45309;--amber-bg:#fffbeb;
  --r:10px;--r2:14px;
}
html,body{height:100%;background:#e8e4dc;}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;display:flex;justify-content:center;padding:16px;}
.app{width:100%;max-width:420px;background:var(--paper);border-radius:var(--r2);overflow:hidden;align-self:flex-start;}
.setup-head{background:var(--paper2);border-bottom:1.5px solid var(--line);padding:20px 18px 16px;}
.setup-title{font-size:22px;font-weight:600;color:var(--ink);letter-spacing:-0.3px;}
.setup-sub{font-size:13px;color:var(--ink3);margin-top:3px;}
.setup-body{padding:18px;}
.s-label{font-size:12px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.np-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:22px;}
.np-btn{padding:13px 0;border-radius:var(--r);border:1.5px solid var(--line);background:var(--paper);color:var(--ink2);font-family:inherit;font-size:17px;font-weight:500;cursor:pointer;}
.np-btn.on{border-color:var(--blue);background:var(--blue-bg);color:var(--blue-t);font-weight:600;}
.name-wrap{border:1.5px solid var(--line);border-radius:var(--r2);overflow:hidden;margin-bottom:22px;}
.name-row{display:flex;align-items:center;border-bottom:1px solid var(--line2);}
.name-row:last-child{border-bottom:none;}
.name-num{width:36px;text-align:center;font-size:13px;font-weight:600;color:var(--ink3);flex-shrink:0;}
.name-input{flex:1;padding:13px 10px 13px 0;border:none;background:transparent;font-family:inherit;font-size:16px;color:var(--ink);outline:none;}
.name-input::placeholder{color:var(--ink3);}
.info-strip{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r);padding:11px 14px;margin-bottom:20px;font-size:13px;color:var(--ink2);}
.info-strip .row{display:flex;justify-content:space-between;margin-bottom:4px;}
.info-strip .row:last-child{margin-bottom:0;}
.info-strip strong{color:var(--ink);font-weight:600;}
.btn-blue{width:100%;padding:15px;border-radius:var(--r2);border:none;background:var(--blue);color:#fff;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;}
.btn-green{width:100%;padding:15px;border-radius:var(--r2);border:none;background:var(--green);color:#fff;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;}
.btn-off{width:100%;padding:15px;border-radius:var(--r2);border:none;background:var(--paper2);color:var(--ink3);font-family:inherit;font-size:16px;font-weight:500;cursor:not-allowed;}
.game-head{background:var(--paper2);border-bottom:1.5px solid var(--line);padding:14px 16px 0;}
.g-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.g-round{font-size:13px;color:var(--ink3);}
.g-round strong{font-size:18px;font-weight:600;color:var(--ink);}
.g-cards{text-align:center;}
.g-cards .big{font-size:21px;font-weight:600;color:var(--ink);}
.g-cards .sm{font-size:11px;color:var(--ink3);}
.g-tab{padding:7px 13px;border-radius:var(--r);border:1px solid var(--line);background:var(--paper);color:var(--ink2);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;}
.prog{height:3px;background:var(--line2);}
.prog-fill{height:100%;background:var(--blue);transition:width .3s;}
.score-strip{border-bottom:1.5px solid var(--line);overflow-x:auto;display:flex;}
.sc-cell{flex:1;min-width:0;padding:9px 8px;text-align:center;border-right:1px solid var(--line2);}
.sc-cell:last-child{border-right:none;}
.sc-name{font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-val{font-size:15px;font-weight:600;color:var(--ink);}
.sc-val.lead{color:var(--blue-t);}
.game-body{padding:16px;}
.phase-label{font-size:12px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.phase-sub{font-size:13px;color:var(--ink2);margin-bottom:14px;}
.player-rows{border:1.5px solid var(--line);border-radius:var(--r2);overflow:hidden;margin-bottom:16px;}
.p-row{border-bottom:1px solid var(--line2);padding:12px 14px;}
.p-row:last-child{border-bottom:none;}
.p-row.last-bidder{background:var(--amber-bg);}
.p-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.p-name{font-size:15px;font-weight:600;color:var(--ink);}
.p-badge{font-size:11px;font-weight:500;color:var(--amber);background:var(--amber-bg);border:1px solid #fcd34d;padding:2px 9px;border-radius:20px;}
.p-bid-info{font-size:12px;color:var(--ink3);}
.p-bid-info strong{color:var(--ink);font-weight:600;}
.p-row-bot{display:flex;align-items:center;gap:10px;}
.p-select{flex:1;padding:11px 12px;border-radius:var(--r);border:1.5px solid var(--line);background:var(--paper);color:var(--ink);font-family:inherit;font-size:16px;cursor:pointer;outline:none;}
.p-select:focus{border-color:var(--blue);}
.score-box{min-width:56px;text-align:center;padding:9px 4px;border-radius:var(--r);font-size:15px;font-weight:600;}
.score-box.pos{background:var(--green-bg);color:var(--green);}
.score-box.neg{background:var(--red-bg);color:var(--red);}
.score-box.zer{background:var(--paper2);color:var(--ink3);}
.sum-note{font-size:13px;color:var(--ink3);margin-bottom:14px;}
.sum-note.ok{color:var(--green);font-weight:500;}
.score-table-wrap{padding:16px;}
.score-table-wrap table{width:100%;border-collapse:collapse;table-layout:fixed;}
.score-table-wrap th{padding:9px 5px;font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;text-align:center;border-bottom:2px solid var(--line);}
.score-table-wrap th:first-child{text-align:left;width:28px;}
.score-table-wrap td{padding:9px 5px;font-size:13px;text-align:center;border-bottom:1px solid var(--line2);}
.score-table-wrap td:first-child{text-align:left;color:var(--ink3);font-size:12px;font-weight:500;}
.score-table-wrap tfoot td{font-size:14px;font-weight:700;color:var(--ink);border-top:2px solid var(--line);border-bottom:none;padding-top:11px;}
.td-pos{color:var(--green);}
.td-neg{color:var(--red);}
.td-zer{color:var(--ink3);}
.end-head{background:var(--paper2);border-bottom:1.5px solid var(--line);padding:20px 18px 16px;text-align:center;}
.rank-rows{padding:16px;}
.rank-row{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:var(--r2);margin-bottom:8px;border:1.5px solid var(--line);}
.rank-row.gold{border-color:#fbbf24;background:#fffbeb;}
.rank-name{flex:1;font-size:16px;font-weight:600;color:var(--ink);}
.rank-score{font-size:21px;font-weight:700;color:var(--ink);}
.rank-row.gold .rank-score{color:var(--amber);}
details{margin:0 16px 16px;}
details summary{font-size:13px;color:var(--ink3);cursor:pointer;padding:8px 0;border-top:1px solid var(--line2);list-style:none;font-weight:500;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const TOTAL=36;
function getRounds(n){const max=Math.floor(TOTAL/n),r=[];for(let i=1;i<=max;i++)r.push(i);for(let j=1;j<n;j++)r.push(max);for(let i=max-1;i>=1;i--)r.push(i);return r;}
function calcScore(bid,won){if(won===bid)return 100+won*50;if(won>bid)return(won-bid)*10;return(bid-won)*-50;}

let S={phase:'setup',np:4,names:['','','','','',''],rounds:[],ri:0,totals:[],hist:[],bids:[],acts:[],step:'bidding',tab:'game'};

function getForbidden(){const last=S.ri%S.np,c=S.rounds[S.ri];const sum=S.bids.reduce((s,b,i)=>i===last?s:s+(parseInt(b)||0),0);const f=c-sum;return(f>=0&&f<=c)?f:null;}
function allBidsOk(){const c=S.rounds[S.ri],last=S.ri%S.np,forb=getForbidden();return S.bids.every((b,i)=>{const v=parseInt(b);if(isNaN(v)||v<0||v>c)return false;if(i===last&&v===forb)return false;return true;});}
function actsSum(){return S.acts.reduce((s,a)=>s+(parseInt(a)||0),0);}
function allActsOk(){return S.acts.every(a=>a!==''&&!isNaN(parseInt(a))&&parseInt(a)>=0)&&actsSum()===S.rounds[S.ri];}
function pname(i){return S.names[i]||'Mangija '+(i+1);}

function makeOpts(max,forb,sel){
  let h=`<option value="" disabled ${sel===''?'selected':''}>vali</option>`;
  for(let v=0;v<=max;v++){const dis=forb!==null&&v===forb;h+=`<option value="${v}" ${dis?'disabled':''} ${parseInt(sel)===v&&sel!==''?'selected':''}>${dis?v+' (keelatud)':v}</option>`;}
  return h;
}

function render(){document.getElementById('app').innerHTML=getHtml();bind();}

function getHtml(){if(S.phase==='setup')return setupHtml();if(S.phase==='game')return gameHtml();return endHtml();}

function setupHtml(){
  const n=S.np,max=Math.floor(TOTAL/n),r=getRounds(n);
  return `<div class="setup-head"><div class="setup-title">Sitaratas</div><div class="setup-sub">36 kaarti, tulemuste arvestus</div></div>
<div class="setup-body">
  <div class="s-label">Mangijate arv</div>
  <div class="np-grid">${[3,4,5,6].map(n=>`<button class="np-btn${n===S.np?' on':''}" data-a="np" data-v="${n}">${n}</button>`).join('')}</div>
  <div class="s-label">Nimed</div>
  <div class="name-wrap">${Array.from({length:S.np},(_,i)=>`<div class="name-row"><span class="name-num">${i+1}</span><input class="name-input" data-a="name" data-i="${i}" value="${S.names[i]}" placeholder="Mangija ${i+1}"></div>`).join('')}</div>
  <div class="info-strip">
    <div class="row"><span>Voore kokku:</span><strong>${r.length}</strong></div>
    <div class="row"><span>Max kaarte voorus:</span><strong>${max}</strong></div>
    <div class="row"><span>Skaala:</span><strong>1 kuni ${max} (${n}x) ja tagasi</strong></div>
  </div>
  <button class="btn-blue" data-a="start">Alusta mangu</button>
</div>`;}

function scoreStripHtml(){const maxScore=Math.max(...S.totals);return `<div class="score-strip">${S.totals.map((t,i)=>`<div class="sc-cell"><div class="sc-name">${pname(i)}</div><div class="sc-val${t===maxScore&&t>0?' lead':''}">${t}</div></div>`).join('')}</div>`;}

function gameHtml(){
  const c=S.rounds[S.ri],total=S.rounds.length,pct=Math.round(S.ri/total*100);
  const last=S.ri%S.np,forb=getForbidden(),isMax=c===Math.floor(TOTAL/S.np);
  const head=`<div class="game-head"><div class="g-top"><div class="g-round">Voor <strong>${S.ri+1}</strong> <span style="color:var(--ink3);font-size:13px">/ ${total}</span></div><div class="g-cards"><div class="big">${c} kaarti</div><div class="sm">${isMax?'max voor':'jaotust voorus'}</div></div><button class="g-tab" data-a="tab">${S.tab==='game'?'Skoor':'Mang'}</button></div><div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div></div>${scoreStripHtml()}`;
  if(S.tab==='scores')return head+`<div class="score-table-wrap">${scoreTableHtml()}</div>`;
  if(S.step==='bidding'){
    const rows=Array.from({length:S.np},(_,i)=>{const isLast=i===last;return `<div class="p-row${isLast?' last-bidder':''}"><div class="p-top"><span class="p-name">${pname(i)}</span>${isLast?`<span class="p-badge">viimane (ei saa: ${forb!==null?forb:'ok'})</span>`:''}</div><select class="p-select" data-a="bid" data-i="${i}">${makeOpts(c,isLast?forb:null,S.bids[i])}</select></div>`;}).join('');
    const ok=allBidsOk();
    return head+`<div class="game-body"><div class="phase-label">Pakkumised</div><div class="phase-sub">Mitu jaotust voidad? (0 kuni ${c})</div><div class="player-rows">${rows}</div><button class="${ok?'btn-blue':'btn-off'}" data-a="confirmBids" ${ok?'':'disabled'}>Kinnita pakkumised</button></div>`;}
  const asum=actsSum(),ok=allActsOk(),isLastR=S.ri===S.rounds.length-1;
  const rows=Array.from({length:S.np},(_,i)=>{const bid=parseInt(S.bids[i]),act=parseInt(S.acts[i]);const s=!isNaN(act)?calcScore(bid,act):null;const cls=s===null?'':s>0?'pos':s<0?'neg':'zer';return `<div class="p-row"><div class="p-top"><span class="p-name">${pname(i)}</span><span class="p-bid-info">Pakkus: <strong>${bid}</strong></span></div><div class="p-row-bot"><select class="p-select" data-a="act" data-i="${i}">${makeOpts(c,null,S.acts[i])}</select>${s!==null?`<div class="score-box ${cls}">${s>0?'+'+s:s}</div>`:'<div style="min-width:56px;"></div>'}</div></div>`;}).join('');
  return head+`<div class="game-body"><div class="phase-label">Tegelik tulemus</div><p class="sum-note${ok?' ok':''}">Jaotusi kokku: ${asum} / ${c}${ok?' (ok)':''}</p><div class="player-rows">${rows}</div><button class="${ok?(isLastR?'btn-green':'btn-blue'):'btn-off'}" data-a="confirmActs" ${ok?'':'disabled'}>${isLastR?'Lopeta mang':'Jargmine voor'}</button></div>`;}

function scoreTableHtml(){
  const names=Array.from({length:S.np},(_,i)=>pname(i));
  const ths=names.map(n=>`<th style="max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${n}</th>`).join('');
  const rows=S.hist.map((h,ri)=>{const cells=h.rs.map(s=>{const cls=s>0?'td-pos':s<0?'td-neg':'td-zer';return `<td class="${cls}">${s>0?'+'+s:s}</td>`;}).join('');return `<tr><td>${S.rounds[ri]}k</td>${cells}</tr>`;}).join('')||`<tr><td colspan="${S.np+1}" style="color:var(--ink3);font-size:13px;padding:14px 0;">Pole veel voore</td></tr>`;
  const tots=S.totals.map(s=>`<td>${s}</td>`).join('');
  return `<div style="overflow-x:auto;"><table><colgroup><col style="width:28px">${names.map(()=>'<col>').join('')}</colgroup><thead><tr><th></th>${ths}</tr></thead><tbody>${rows}</tbody><tfoot><tr><td>Kokku</td>${tots}</tr></tfoot></table></div>`;}

function endHtml(){
  const names=Array.from({length:S.np},(_,i)=>pname(i));
  const rank=names.map((n,i)=>({n,s:S.totals[i]})).sort((a,b)=>b.s-a.s);
  const rows=rank.map((p,r)=>`<div class="rank-row${r===0?' gold':''}"><span style="width:28px;text-align:center;font-size:15px;font-weight:700;color:var(--ink3);">${r+1}.</span><span class="rank-name">${p.n}</span><span class="rank-score">${p.s}</span></div>`).join('');
  return `<div class="end-head"><div style="font-size:22px;font-weight:700;color:var(--ink);">Mang labi!</div><div style="font-size:13px;color:var(--ink3);margin-top:4px;">Lopptulemus</div></div><div class="rank-rows">${rows}</div><details><summary>Vaata koiki voore</summary><div style="margin-top:12px;">${scoreTableHtml()}</div></details><div style="padding:0 16px 16px;"><button class="btn-blue" data-a="newGame">Uus mang</button></div>`;}

function bind(){
  document.querySelectorAll('[data-a]').forEach(el=>{
    const ev=el.tagName==='SELECT'?'change':'click';
    el.addEventListener(ev,e=>{
      const a=e.currentTarget.dataset.a;
      if(a==='np'){S.np=parseInt(e.currentTarget.dataset.v);render();}
      else if(a==='tab'){S.tab=S.tab==='game'?'scores':'game';render();}
      else if(a==='bid'){S.bids[parseInt(e.currentTarget.dataset.i)]=e.currentTarget.value;render();}
      else if(a==='act'){S.acts[parseInt(e.currentTarget.dataset.i)]=e.currentTarget.value;render();}
      else if(a==='confirmBids'){if(!allBidsOk())return;S.step='results';S.acts=Array(S.np).fill('');render();}
      else if(a==='confirmActs'){
        if(!allActsOk())return;
        const rs=Array.from({length:S.np},(_,i)=>calcScore(parseInt(S.bids[i]),parseInt(S.acts[i])));
        S.totals=S.totals.map((t,i)=>t+rs[i]);
        S.hist.push({c:S.rounds[S.ri],bids:S.bids.map(Number),acts:S.acts.map(Number),rs});
        if(S.ri===S.rounds.length-1){S.phase='gameover';render();return;}
        S.ri++;S.bids=Array(S.np).fill('');S.acts=Array(S.np).fill('');S.step='bidding';S.tab='game';render();
      }
      else if(a==='newGame'){S.phase='setup';render();}
      else if(a==='start'){
        const n=S.np;S.rounds=getRounds(n);S.ri=0;S.totals=Array(n).fill(0);S.hist=[];
        S.bids=Array(n).fill('');S.acts=Array(n).fill('');S.step='bidding';S.tab='game';S.phase='game';render();
      }
    });
  });
  document.querySelectorAll('input[data-a="name"]').forEach(el=>{
    el.addEventListener('input',e=>{S.names[parseInt(e.currentTarget.dataset.i)]=e.currentTarget.value;});
  });
}
render();
</script>
</body>
</html>
